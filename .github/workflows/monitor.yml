name: IPO & Investment Opportunity Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit dashboard + state back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitors and regenerate dashboard
        continue-on-error: true
        run: python main.py --once

      - name: Commit updated dashboard and state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html state.db
          git diff --staged --quiet || git commit -m "chore: update dashboard [skip ci]"
          git push
