<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IPO &amp; Investment Watchlist</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
           background: #f3f4f6; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; }
    .box { background: #fff; border-radius: 14px; padding: 48px 40px; text-align: center;
           max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    h1 { font-size: 22px; color: #1e3a5f; margin-bottom: 12px; }
    p  { color: #6b7280; font-size: 15px; line-height: 1.6; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb;
               border-top-color: #2563eb; border-radius: 50%;
               animation: spin 1s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>IPO &amp; Investment Watchlist</h1>
    <p>The first monitor run hasn't completed yet.<br>
       GitHub Actions will update this page within 30&nbsp;minutes.<br>
       Refresh to check.</p>
  </div>
</body>
</html>
